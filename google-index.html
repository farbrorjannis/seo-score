<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO & AI Check - Dashboard</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf6;
            --card: #ffffff;
            --accent: #8b5e3c;
            --text: #333333;
            --text-dim: #666666;
            --bar: #e0d5c5;
            --success: #6b8e23;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            font-size: 16px;
            line-height: 1.4;
        }

        .container { max-width: 500px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.6rem; margin: 0; color: var(--accent); }
        .subtitle { font-size: 0.9rem; color: var(--text-dim); }

        /* Input Area */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--bar);
            border-radius: 12px;
            font-size: 16px;
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Dashboard Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .full { grid-column: span 2; }

        /* Grafiska Element */
        .gauge {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(var(--accent) var(--p, 0%), var(--bar) 0);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 10px;
            transition: --p 0.5s;
        }
        .gauge::after {
            content: attr(data-val);
            position: absolute;
            width: 64px;
            height: 64px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .bar-wrap {
            width: 100%;
            height: 10px;
            background: var(--bar);
            border-radius: 5px;
            margin: 10px 0;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.8s ease-out;
        }

        h3 { font-size: 1rem; margin: 5px 0; }
        .status-text { font-size: 0.9rem; font-weight: 600; color: var(--accent); }
        .info { font-size: 0.85rem; color: var(--text-dim); margin-top: 5px; }

        #results { display: none; margin-top: 20px; }
        .loading { text-align: center; padding: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SEO & AI Check</h1>
        <p class="subtitle">15 års erfarenhet i en snabbkoll</p>
    </header>

    <div class="input-group">
        <input type="text" id="urlInput" placeholder="dinsida.se">
        <button onclick="startAnalyze()">Kolla</button>
    </div>

    <div id="loading" class="loading">Analyserar din närvaro...</div>

    <div id="results">
        <div class="grid">
            <!-- SEO Score klocka -->
            <div class="card">
                <div id="seoGauge" class="gauge" data-val="0%" style="--p: 0%"></div>
                <h3>SEO Score</h3>
                <span class="status-text" id="seoStatus">-</span>
            </div>

            <!-- AI Readiness -->
            <div class="card">
                <div style="font-size: 2.5rem; margin-bottom: 5px;">🤖</div>
                <h3>AI-klar</h3>
                <span class="status-text" id="aiStatus">Väntar...</span>
                <span class="info">Förstår botarna dig?</span>
            </div>

            <!-- Hastighet stapel -->
            <div class="card full">
                <div style="width: 100%; display: flex; justify-content: space-between;">
                    <h3>Laddningstid</h3>
                    <span id="speedVal" class="status-text">0ms</span>
                </div>
                <div class="bar-wrap">
                    <div id="speedBar" class="bar-fill"></div>
                </div>
                <p class="info" id="speedDesc">Vi mäter hur snabbt proffsbygget svarar.</p>
            </div>

            <!-- Mobiloptimering -->
            <div class="card">
                <div style="font-size: 1.8rem;">📱</div>
                <h3>Mobilvänlig</h3>
                <div class="bar-wrap" style="width: 60px;">
                    <div id="mobileBar" class="bar-fill"></div>
                </div>
                <span class="info" id="mobileStatus">Kollar...</span>
            </div>

            <!-- Metadata/Innehåll -->
            <div class="card">
                <div style="font-size: 1.8rem;">🎯</div>
                <h3>Relevans</h3>
                <span id="relevanceVal" class="status-text">-</span>
                <span class="info">Hittar kunderna rätt?</span>
            </div>
        </div>
    </div>
</div>

<script>
    async function startAnalyze() {
        const url = document.getElementById('urlInput').value;
        if(!url) return alert("Skriv in en adress först!");

        // Visa laddning
        document.getElementById('loading').style.display = 'block';
        document.getElementById('results').style.display = 'none';

        // Simulera analys (här kopplar du din riktiga fetch-logik senare)
        setTimeout(() => {
            renderResults();
        }, 1500);
    }

    function renderResults() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('results').style.display = 'block';

        // Här sätter du in dina riktiga beräknade värden
        const scores = {
            seo: 88,
            ai: "Hög",
            speed: 92,
            speedMs: "1.2s",
            mobile: 100,
            relevance: "9/10"
        };

        // Uppdatera GUI
        const seoG = document.getElementById('seoGauge');
        seoG.style.setProperty('--p', scores.seo + '%');
        seoG.setAttribute('data-val', scores.seo + '%');
        document.getElementById('seoStatus').innerText = "Väl optimerad";

        document.getElementById('aiStatus').innerText = scores.ai;
        
        document.getElementById('speedBar').style.width = scores.speed + '%';
        document.getElementById('speedVal').innerText = scores.speedMs;
        
        document.getElementById('mobileBar').style.width = scores.mobile + '%';
        document.getElementById('mobileStatus').innerText = "Sömlös";
        
        document.getElementById('relevanceVal').innerText = scores.relevance;
    }
</script>

</body>
</html>
